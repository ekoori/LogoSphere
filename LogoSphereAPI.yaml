openapi: 3.0.0
info:
  title: LogoSphere API
  description: API for handling user interactions within the LogoSphere platform.
  version: 1.0.0

servers:
  - url: "https://api.trustsphere.example.com"
    description: LogoSphere API server

paths:

  /api/login:
    post:
      summary: User Login
      description: Logs in a user using their email and password.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: User successfully logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
                    description: Auth token to use for accessing account-specific actions
        '401':
          description: Authentication failed
      tags:
        - Authentication
    options:
      summary: Options for User Login
      description: Retrieve the supported methods and other communicative options for the login endpoint.
      responses:
        '204':
          description: No Content
      tags:
        - Options
  /api/logout:
    post:
      summary: User Logout
      description: Handles the POST request for user logout and ends the current user session.
      operationId: logoutUser
      responses:
        200:
          description: Logout successful, session ended.
      tags:
        - Authentication
    options:
      summary: Options for User Logout
      description: Retrieve the supported methods and other communicative options for the login endpoint.
      responses:
        '204':
          description: No Content
      tags:
        - Options
  /api/check_session:
    post:
      summary: Check User Session
      description: Checks the validity of the current user session.
      operationId: postUserSession
      responses:
        200:
          description: Session is valid.
        401:
          description: Session is invalid or expired.
      tags:
        - Authentication
    get:
      summary: Check User Session
      description: Verifies if there is a currently logged-in user by checking the session ID.
      operationId: checkUserSession
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          description: The session ID to verify the user session
      responses:
        '200':
          description: Session check successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  isLoggedIn:
                    type: boolean
                    description: Indicates whether a user is logged in or not
        '400':
          description: Bad request, possibly missing session information
      tags:
        - Authentication

  /api/register:
    post:
      summary: Register a new user
      description: Registers a new user with their name, email, and password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Password Hash (Never send in plaintext)
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input parameters
      tags:
        - User Management


  /api/user:
    get:
      summary: Retrieve User Profile
      description: Fetches details of the currently logged-in user.
      operationId: getUserProfile
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          description: The session ID to verify which user's profile to fetch
      responses:
        '200':
          description: User profile fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                  email:
                    type: string
                  name:
                    type: string
                  additionalProperties:
                    type: object
        '401':
          description: Unauthorized access, session invalid or not provided
      tags:
        - User Management
    post:
      summary: Update User Profile
      description: Updates the profile information for the logged-in user.
      operationId: updateUserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
              properties:
                session_id:
                  type: string
                  description: Auth token to use for verifying user identity
                email:
                  type: string
                  format: email
                  description: (Optional) New email to update
                name:
                  type: string
                  description: (Optional) New name to update
      responses:
        '200':
          description: User profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Bad request, missing or incorrect information provided
        '401':
          description: Unauthorized to update user profile
      tags:
        - User Management


  /api/meaning_trail:
    get:
      summary: Get User Meaning Trail
      description: Retrieves the trust trail for a specified user.
      operationId: getMeaning TrailDetails
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
          description: The ID of the user for whom to fetch the trust trail
      responses:
        '200':
          description: Trust trail fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meaning TrailDetails'
        '400':
          description: Bad request, possibly missing userId in query
        '405':
          description: Invalid request method. Only GET allowed.

  /api/meaning_trail/add_interaction:
    post:
      summary: Add Interaction to Meaning Trail (duplicate?)
      description: Adds a new interaction to the user's trust trail.
      operationId: addMeaning TrailInteraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Meaning TrailInteraction'
      responses:
        '200':
          description: Interaction added successfully
        '400':
          description: Bad request, possibly due to missing or incorrect data


  /api/meaning_trail/{userId}:
    get:
      summary: Get comprehensive Meaning Trail for a user
      operationId: getMeaning Trail
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Successful retrieval of Meaning Trail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meaning Trail'
        400:
          description: User ID not provided or invalid

  /api/meaning_trail/interaction:
    post:
      summary: Add a new interaction to the Meaning Trail
      operationId: addInteraction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Interaction'
      responses:
        200:
          description: Interaction successfully added
        400:
          description: Missing required fields

  /api/meaning_trail/comment/gratitude:
    post:
      summary: Add a gratitude comment to a interaction
      operationId: addGratitudeComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interaction_id:
                  type: string
                  format: uuid
                comment:
                  type: string
      responses:
        200:
          description: Comment added successfully
        400:
          description: Missing required data or interaction not found

  /api/openings/post_service:
    post:
      summary: Post a Service
      description: Allows a user to post a new service to the openings.
      operationId: postService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - is_part_of_project
              properties:
                title:
                  type: string
                description:
                  type: string
                is_part_of_project:
                  type: boolean
                  description: Indicates whether the service is part of an existing project.
      responses:
        '201':
          description: Service successfully posted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Service successfully posted."
        '400':
          description: Bad request, possibly missing or incorrect information provided
      tags:
        - Openings
  
  /api/openings/browse_services:
    get:
      summary: Browse Services
      description: Retrieve a list of services based on specified filters.
      operationId: browseServices
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: string
            description: Filter criteria for browsing services.
      responses:
        '200':
          description: Successfully retrieved list of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
        '400':
          description: Incorrect filter specification
      tags:
        - Openings

  /api/openings/request_service:
    post:
      summary: Request a Service
      description: Allows a user to request a service.
      operationId: requestService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_id
                - user_id
              properties:
                service_id:
                  type: string
                  format: uuid
                user_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Service request successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Service request successful."
        '400':
          description: Bad request, possibly due to incorrect service or user ID
      tags:
        - Openings

  /api/openings/accept_service:
    post:
      summary: Accept a Service
      description: Accepts a service offer, initiating an active interaction.
      operationId: acceptService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_id
                - user_id
              properties:
                service_id:
                  type: string
                  format: uuid
                user_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Service accepted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Service accepted successfully."
        '400':
          description: Bad request, possibly due to incorrect service or user ID
      tags:
        - Openings
  /api/alliances:
    post:
      summary: Create a new union
      description: Allows an authorized user to create a new union.
      operationId: createAlliance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Alliance'
      responses:
        '201':
          description: Alliance created successfully.
        '400':
          description: Bad request, possibly missing required data.
      tags:
        - Alliances
  /api/alliances/{unionId}:
    get:
      summary: Retrieve a union's details
      description: Returns detailed information about a union, including its members.
      operationId: getAlliance
      parameters:
        - name: unionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully retrieved union details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alliance'
        '404':
          description: Alliance not found.
      tags:
        - Alliances

    patch:
      summary: Update a union's details
      description: Allows modifications to a union's details like name or description.
      operationId: updateAlliance
      parameters:
        - name: unionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Alliance updated successfully.
        '400':
          description: Bad request, invalid data provided.
        '404':
          description: Alliance not found.
      tags:
        - Alliances

    delete:
      summary: Delete a union
      description: Removes a union from the system. Should actually be deactivated instead of deleted.
      operationId: deleteAlliance
      parameters:
        - name: unionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Alliance deleted successfully.
        '404':
          description: Alliance not found.
      tags:
        - Alliances







components:
  schemas:
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        session_id:
          type: string
    Invitation:
      type: object
      properties:
        code:
          type: string
          format: uuid
          description: A unique identifier for the invitation.
          readOnly: true
        email:
          type: string
          format: email
          description: Email of the user to be invited.
      required:
        - email
      description: |
        This module contains the Invitation model for handling user invitation related tasks.

    Meaning TrailInteraction:
      type: object
      required:
        - user_id
        - other_user_id
        - project_id
      properties:
        user_id:
          type: string
          description: The ID of the user who is initiating the interaction
        other_user_id:
          type: string
          description: The ID of the other user involved in the interaction
        project_id:
          type: string
          description: The ID of the project related to the interaction

    Meaning TrailDetails:
      type: array
      items:
        type: object
        properties:
          interactionId:
            type: string
          involvedParties:
            type: array
            items:
              type: string
          details:
            type: object
            additionalProperties: true


    Interaction:
      type: object
      properties:
        interaction_id:
          type: string
          format: uuid
        other_user_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        interaction_description:
          type: string
        interaction_status:
          type: string
    Meaning Trail:
      type: array
      items:
        $ref: '#/components/schemas/Interaction'

    Service:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        is_part_of_project:
          type: boolean
        service_id:
          type: string
          format: uuid


    Alliance:
      type: object
      properties:
        alliance_id:
          type: string
          format: uuid
          description: A unique identifier for this union.
        name:
          type: string
          description: The name of the union.
        members:
          type: array
          items:
            type: string
            format: uuid
          description: List of user IDs who are members of this union.
        description:
          type: string
          description: A brief description or purpose of the union.
        created_at:
          type: string
          format: date-time
          description: Timestamp of when the union was created.
      required:
        - alliance_id
        - name
        - members